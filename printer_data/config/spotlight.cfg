##############################################################################
#
# This is a script for Klipper that allows for Wyze Cam V3 cameras running the 
# Thingino (https://github.com/themactep/thingino-firmware) camera firmware to
# control the Wyze Cam V3 Spotlight accessory
#
##############################################################################

# ---------------------------------------------------------------------------
# Shell command definitions — CAM1 Front (10.0.0.36)
# ---------------------------------------------------------------------------

[gcode_shell_command front_spotlight_high_cmd]
command: ssh -i /home/biqu/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.0.0.36 'spotlight_ctl high'
timeout: 5.
verbose: False

[gcode_shell_command front_spotlight_low_cmd]
command: ssh -i /home/biqu/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.0.0.36 'spotlight_ctl low'
timeout: 5.
verbose: False

[gcode_shell_command front_spotlight_off_cmd]
command: ssh -i /home/biqu/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.0.0.36 'spotlight_ctl off'
timeout: 5.
verbose: False

# ---------------------------------------------------------------------------
# Shell command definitions — CAM2 = Overhead (10.0.0.37)
# ---------------------------------------------------------------------------

[gcode_shell_command overhead_spotlight_high_cmd]
command: ssh -i /home/biqu/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.0.0.37 'spotlight_ctl high'
timeout: 5.
verbose: False

[gcode_shell_command overhead_spotlight_low_cmd]
command: ssh -i /home/biqu/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.0.0.37 'spotlight_ctl low'
timeout: 5.
verbose: False

[gcode_shell_command overhead_spotlight_off_cmd]
command: ssh -i /home/biqu/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.0.0.37 'spotlight_ctl off'
timeout: 5.
verbose: False

# ---------------------------------------------------------------------------
# Per-camera macros — CAM1 Front
# ---------------------------------------------------------------------------

[gcode_macro FRONT_SPOTLIGHT_HIGH]
description: FRONT spotlight full brightness
gcode:
    RESPOND MSG="FRONT Spotlight: HIGH"
    RUN_SHELL_COMMAND CMD=front_spotlight_high_cmd

[gcode_macro FRONT_SPOTLIGHT_LOW]
description: FRONT spotlight low brightness
gcode:
    RESPOND MSG="FRONT Spotlight: LOW"
    RUN_SHELL_COMMAND CMD=front_spotlight_low_cmd

[gcode_macro FRONT_SPOTLIGHT_OFF]
description: FRONT spotlight off
gcode:
    RESPOND MSG="FRONT Spotlight: OFF"
    RUN_SHELL_COMMAND CMD=front_spotlight_off_cmd

# ---------------------------------------------------------------------------
# Per-camera macros — CAM2 Overhead
# ---------------------------------------------------------------------------

[gcode_macro OVERHEAD_SPOTLIGHT_HIGH]
description: OVERHEAD spotlight full brightness
gcode:
    RESPOND MSG="OVERHEAD Spotlight: HIGH"
    RUN_SHELL_COMMAND CMD=overhead_spotlight_high_cmd

[gcode_macro OVERHEAD_SPOTLIGHT_LOW]
description: OVERHEAD spotlight low brightness
gcode:
    RESPOND MSG="OVERHEAD Spotlight: LOW"
    RUN_SHELL_COMMAND CMD=overhead_spotlight_low_cmd

[gcode_macro OVERHEAD_SPOTLIGHT_OFF]
description: OVERHEAD spotlight off
gcode:
    RESPOND MSG="OVERHEAD Spotlight: OFF"
    RUN_SHELL_COMMAND CMD=overhead_spotlight_off_cmd

# ---------------------------------------------------------------------------
# Combined macros — all cameras
# ---------------------------------------------------------------------------

[gcode_macro SPOTLIGHT_HIGH]
description: All spotlights full brightness
gcode:
    FRONT_SPOTLIGHT_HIGH
    OVERHEAD_SPOTLIGHT_HIGH

[gcode_macro SPOTLIGHT_LOW]
description: All spotlights low brightness
gcode:
    FRONT_SPOTLIGHT_LOW
    OVERHEAD_SPOTLIGHT_LOW

[gcode_macro SPOTLIGHT_OFF]
description: All spotlights off
gcode:
    FRONT_SPOTLIGHT_OFF
    OVERHEAD_SPOTLIGHT_OFF
