##############################################################################
# Wyze Cam V3 Spotlight Control (Thingino Firmware)
#
# Camera IP:  10.0.0.37
# Firmware:   Thingino (https://github.com/themactep/thingino-firmware)
#
# Prerequisites:
#   1. Install the gcode_shell_command extension via KIAUH, or manually place
#      gcode_shell_command.py in your ~/klipper/klippy/extras/ directory.
#      Restart Klipper after installing.
#
#   2. Set up passwordless SSH from your Klipper host to the camera so the
#      shell commands can run non-interactively:
#
#        # On your Klipper host (run as the user Klipper runs under, e.g. pi):
#        ssh-keygen -t ed25519 -C "klipper-spotlight" -f ~/.ssh/id_spotlight -N ""
#        ssh-copy-id -i ~/.ssh/id_spotlight.pub root@10.0.0.37
#
#      Then verify it works without a password prompt:
#        ssh -i ~/.ssh/id_spotlight root@10.0.0.37 echo ok
#
#   3. Add the following line to your printer.cfg to include this file:
#        [include spotlight.cfg]
##############################################################################

# ---------------------------------------------------------------------------
# Shell command definitions
# ---------------------------------------------------------------------------

[gcode_shell_command spotlight_on_cmd]
command: ssh -i /home/pi/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.0.0.37 spotlight_ctl high
timeout: 5.
verbose: False

[gcode_shell_command spotlight_off_cmd]
command: ssh -i /home/pi/.ssh/id_spotlight -o StrictHostKeyChecking=no -o ConnectTimeout=3 root@10.0.0.37 spotlight_ctl off
timeout: 5.
verbose: False

# ---------------------------------------------------------------------------
# Macros
# ---------------------------------------------------------------------------

[gcode_macro SPOTLIGHT_ON]
description: Turn on the Wyze Cam V3 accessory spotlight (Thingino firmware)
gcode:
    RESPOND MSG="Spotlight: ON"
    RUN_SHELL_COMMAND CMD=spotlight_on_cmd

[gcode_macro SPOTLIGHT_OFF]
description: Turn off the Wyze Cam V3 accessory spotlight (Thingino firmware)
gcode:
    RESPOND MSG="Spotlight: OFF"
    RUN_SHELL_COMMAND CMD=spotlight_off_cmd
